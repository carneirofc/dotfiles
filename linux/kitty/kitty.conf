# kitty configuration — mirrors linux/alacritty/alacritty.toml

# --------- general ---------
# xterm-kitty exposes more features, but breaks on hosts without kitty's
# terminfo. Kept in sync with alacritty's [env] TERM.
term                        xterm-256color
shell_integration           enabled
confirm_os_window_close     0
allow_remote_control        no

# ---------- font -----------
font_family                 JetBrainsMono Nerd Font Regular
bold_font                   JetBrainsMono Nerd Font Bold
italic_font                 JetBrainsMono Nerd Font Italic
bold_italic_font            JetBrainsMono Nerd Font Bold Italic
font_size                   12.0

# Ligatures: never disable them, not even under the cursor.
disable_ligatures           never

# --------- window ----------
remember_window_size        no
initial_window_width        100c
initial_window_height       30c
window_padding_width        4
background_opacity          0.9
dynamic_background_opacity  yes
hide_window_decorations     no
wayland_titlebar_color      background

# -------- scrolling --------
scrollback_lines            10000
wheel_scroll_multiplier     3.0

# --------- cursor ----------
cursor_shape                underline
cursor_shape_unfocused      hollow
cursor_underline_thickness  1.5
cursor_blink_interval       0

# ---------- mouse ----------
mouse_hide_wait             3.0
copy_on_select              clipboard
strip_trailing_spaces       smart

# --------- colors ----------
# Nord
background                  #2E3440
foreground                  #D8DEE9
selection_background        #4C566A
selection_foreground        #D8DEE9
cursor                      #D8DEE9
cursor_text_color           background
url_color                   #88C0D0

# black
color0                      #3B4252
color8                      #4C566A
# red
color1                      #BF616A
color9                      #BF616A
# green
color2                      #A3BE8C
color10                     #A3BE8C
# yellow
color3                      #EBCB8B
color11                     #EBCB8B
# blue
color4                      #81A1C1
color12                     #81A1C1
# magenta
color5                      #B48EAD
color13                     #B48EAD
# cyan
color6                      #88C0D0
color14                     #8FBCBB
# white
color7                      #E5E9F0
color15                     #ECEFF4

# --------- keymaps ---------
map ctrl+shift+c            copy_to_clipboard
map ctrl+shift+v            paste_from_clipboard
mouse_map middle release ungrabbed paste_from_selection

map shift+page_up           scroll_page_up
map shift+page_down         scroll_page_down
map shift+home              scroll_home
map shift+end               scroll_end

# alacritty's SearchForward/SearchBackward have no in-terminal equivalent;
# kitty searches through the scrollback pager instead.
map ctrl+shift+f            show_scrollback

map ctrl+l                  combine : clear_terminal scroll active : send_text normal,application \x0c
map ctrl+0                  change_font_size all 0
